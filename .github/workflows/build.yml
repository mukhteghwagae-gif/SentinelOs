name: SentinelOS — Build & Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. FIX: Download gradle-wrapper.jar ──────────────────────────────────
      #  Root cause of "Could not find GradleWrapperMain":
      #  gradle-wrapper.jar is a binary that cannot be committed to git.
      #  We fetch the exact version matching gradle-wrapper.properties (8.4).
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/gradle-wrapper.jar

      # ── 4. Make gradlew executable ───────────────────────────────────────────
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # ── 5. Cache Gradle home ─────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 6. Build Debug APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      # ── 7. Upload APK artifact ───────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SentinelOS-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      # ── 8. Print APK info ────────────────────────────────────────────────────
      - name: Show APK info
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "APK: $APK"
          du -sh "$APK"

  release:
    name: Build Release APK (unsigned)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SentinelOS-release-unsigned-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90
          if-no-files-found: error
